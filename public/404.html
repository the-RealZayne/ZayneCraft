<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function () {
      // Match old blog URL pattern: /YYYY/MM/DD/slug/
      var match = window.location.pathname.match(/^\/(\d{4}\/\d{2}\/\d{2}\/[^/]+)\/?$/);
      if (match) {
        window.location.replace('https://pot.rexchoppers.com/' + match[1]);
        return;
      }

      // Not a known old URL — show 404
      document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('msg').style.display = 'block';
      });
    })();
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #msg {
      display: none;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #888; }
    a { color: #6cf; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="msg">
    <h1>Page Not Found</h1>
    <p>This page doesn't exist.</p>
    <p><a href="/">Back to the experience</a> &middot; <a href="https://pot.rexchoppers.com">Visit pot.rexchoppers.com</a></p>
  </div>
</body>
</html>
